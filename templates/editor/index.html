<!-- templates/editor/index.html -->
<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>COR Editor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #0a0a14;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      #info {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        background: rgba(0, 0, 0, 0.75);
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        pointer-events: none;
        z-index: 100;
        backdrop-filter: blur(5px);
      }
      canvas {
        display: block;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="info">🎮 Загрузка...</div>

    <!-- Babylon.js CDN -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <script src="https://cdn.babylonjs.com/materialsLibrary/babylon.gridMaterial.min.js"></script>
    <script src="https://cdn.babylonjs.com/inspector/babylon.inspector.bundle.js"></script>
    <script src="https://cdn.babylonjs.com/gizmo/babylon.gizmoManager.min.js"></script>

    <!-- Наш модуль -->
    <script type="module" src="/static/js/editor.js"></script>
  </body>
</html>
