{% load static %}
<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>COR Portal</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  </head>
  <body class="portal-container">
    <div class="portal-wrapper">
      <div class="portal-logo">
        <div class="portal-logo-icon"></div>
        <h1>COR</h1>
        <p>Портал в твою вселенную</p>
      </div>

      <div class="portal-card" id="login-card">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="kain@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="password" placeholder="········" autocomplete="current-password" />
        </div>
        <div class="error-msg" id="error"></div>
        <button class="cor-btn cor-btn--primary cor-btn--full" id="login-btn">⚡ Войти в реальность</button>
        <div class="divider">или</div>
        <button class="cor-btn cor-btn--ghost cor-btn--full" id="guest-btn">🌍 Открыть публичный мир</button>
      </div>

      <div class="portal-footer">COR Engine · open source · 2026</div>
    </div>

    <script src="{% static 'js/portal.js' %}"></script>
  </body>
</html>
