<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>COR Portal</title>
    <style>
      :root {
        --bg: #0a0a14;
        --surface: #12122a;
        --border: #1e1e3a;
        --text: #c0c0d0;
        --text-dim: #606080;
        --accent: #ff6600;
        --accent-glow: rgba(255, 102, 0, 0.3);
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: radial-gradient(ellipse at 50% 0%, rgba(255, 102, 0, 0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, rgba(30, 60, 120, 0.1) 0%, transparent 50%);
      }
      
      .container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
      }
      
      .logo {
        text-align: center;
        margin-bottom: 10px;
      }
      
      .logo-icon {
        width: 60px;
        height: 60px;
        margin: 0 auto 15px;
        background: var(--accent);
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        box-shadow: 0 0 40px var(--accent-glow);
        animation: pulse 3s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 20px var(--accent-glow);
        }
        50% {
          box-shadow: 0 0 50px rgba(255, 102, 0, 0.6);
        }
      }
      
      .logo h1 {
        font-size: 36px;
        font-weight: 200;
        letter-spacing: 12px;
        color: #fff;
        text-transform: uppercase;
      }
      
      .logo p {
        color: var(--text-dim);
        font-size: 14px;
        margin-top: 5px;
      }
      
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 30px;
        backdrop-filter: blur(10px);
      }
      
      .form-group {
        margin-bottom: 15px;
      }
      
      .form-group label {
        display: block;
        font-size: 12px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 6px;
      }
      
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: #fff;
        font-size: 15px;
        transition: all 0.2s;
        outline: none;
      }
      
      .form-group input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }
      
      .btn {
        width: 100%;
        padding: 14px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        font-weight: 500;
        letter-spacing: 1px;
        transition: all 0.2s;
        margin-top: 5px;
      }
      
      .btn:hover {
        background: #ff7722;
        box-shadow: 0 0 30px var(--accent-glow);
        transform: translateY(-1px);
      }
      
      .divider {
        text-align: center;
        margin: 20px 0;
        color: var(--text-dim);
        font-size: 12px;
        position: relative;
      }
      
      .divider::before,
      .divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 35%;
        height: 1px;
        background: var(--border);
      }
      .divider::before {
        left: 0;
      }
      .divider::after {
        right: 0;
      }
      
      .btn-ghost {
        width: 100%;
        padding: 12px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text-dim);
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      .btn-ghost:hover {
        border-color: var(--accent);
        color: #fff;
      }
      
      .error {
        color: #ff4444;
        font-size: 13px;
        text-align: center;
        margin-top: 10px;
        display: none;
      }
      
      .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 11px;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Логотип -->
      <div class="logo">
        <div class="logo-icon"></div>
        <h1>COR</h1>
        <p>Портал в твою вселенную</p>
      </div>

      <!-- Форма входа -->
      <div class="card" id="login-card">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="kain@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="password" placeholder="········" autocomplete="current-password" />
        </div>
        <div class="error" id="error"></div>
        <button class="btn" onclick="login()">⚡ Войти в реальность</button>

        <div class="divider">или</div>

        <button class="btn-ghost" id="guest-btn">🌍 Открыть публичный мир</button>
      </div>

      <!-- Список миров (скрыт до входа) -->
      <div class="card" id="worlds-card" style="display: none;">
        <h2 style="font-weight: 300; margin-bottom: 15px;">Твои миры</h2>
        <div id="worlds-list"></div>
        <button class="btn-ghost" style="margin-top: 15px;" onclick="logout()">Выйти</button>
      </div>

      <div class="footer">COR Engine · open source · 2026</div>
    </div>

    <script>
      const API = '/api/v1/auth/login/'
      const GUEST_CHUNK = '4a3f8b2c-1d5e-4f6a-8b9c-0d1e2f3a4b5c'
      
      async function login() {
        const email = document.getElementById('email').value.trim()
        const password = document.getElementById('password').value
        const errorEl = document.getElementById('error')
      
        if (!email || !password) {
          errorEl.textContent = 'Введи email и пароль'
          errorEl.style.display = 'block'
          return
        }
      
        errorEl.style.display = 'none'
      
        try {
          console.log('Отправляю запрос:', { email, password: '***' })
      
          const response = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          })
      
          console.log('Статус ответа:', response.status)
          const data = await response.json()
          console.log('Ответ сервера:', data)
      
          if (response.ok && data.access) {
            localStorage.setItem('cor_token', data.access)
            window.location.href = '/editor/'
          } else {
            const msg = data.detail || 'Неверный email или пароль'
            errorEl.textContent = typeof msg === 'string' ? msg : JSON.stringify(msg)
            errorEl.style.display = 'block'
          }
        } catch (e) {
          console.error('Ошибка:', e)
          errorEl.textContent = 'Сервер не отвечает. Проверь, запущен ли сервер.'
          errorEl.style.display = 'block'
        }
      }
      
      // Вход по Enter
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') login()
      })
      
      // Гостевой вход
      document.getElementById('guest-btn').addEventListener('click', () => {
        window.location.href = `/editor/`
      })
      
      // Если уже залогинен — редирект
      if (localStorage.getItem('cor_token')) {
        window.location.href = '/editor/'
      }
    </script>
  </body>
</html>
